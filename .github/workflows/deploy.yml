name: Deploy Carrier Rating Platform

on:
  push:
    branches: [ main, master ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ --tb=short

      - name: Build Docker image
        run: |
          docker build -t askka/carrier-rating:${{ github.sha }} .
          docker tag askka/carrier-rating:${{ github.sha }} askka/carrier-rating:latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        run: |
          docker push askka/carrier-rating:${{ github.sha }}
          docker push askka/carrier-rating:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull askka/carrier-rating:latest
            docker stop carrier-rating || true
            docker rm carrier-rating || true
            docker run -d -p 8000:8000 --name carrier-rating askka/carrier-rating:latest