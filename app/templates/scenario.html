{% extends 'base.html' %}
{% block title %}Сценарий{% endblock %}

{% block content %}
<div class="panel" style="width: 100%; box-sizing: border-box;">
  <div class="panel-head">
    <a href="{{ url_for('web.index') }}" class="back-arrow">←</a>
    <h1>Настройка сценария</h1>
    <div style="width: 30px;"></div>
  </div>

  <form id="scenarioEditForm" class="stack">
    <input id="name" type="text" value="{{ scenario.name }}" placeholder="Название сценария">
    <textarea id="description" rows="2" style="resize: none;" placeholder="Описание">{{ scenario.description or '' }}</textarea>

    <div class="row" style="gap: 12px;">
      <select id="method" style="flex: 1;">
        <option value="topsis">TOPSIS</option>
        <option value="vikor">VIKOR</option>
      </select>
    </div>

    <div id="criteriaBox" class="criteria-container"></div>
    <div id="criteriaLoading" style="display: none; text-align: center; padding: 20px; color: #667085;">Загрузка...</div>

    <div id="swaraPanel" style="margin-top: 16px; display: none;">
      <div style="margin-bottom: 12px;">
        <h3 style="margin: 0; font-size: 16px; font-weight: 500;">Настройка весовых коэффициентов</h3>
      </div>
      <p style="font-size: 13px; color: #667085; margin-bottom: 16px;">
        Отсортируйте критерии по важности
      </p>
      <div id="swaraContainer" class="swara-container"></div>
      <div id="swaraWeightsPreview" class="swara-preview" style="margin-top: 20px;"></div>
    </div>

    <div class="row gap" style="justify-content: space-between; margin-top: 16px;">
      <button class="btn btn-danger" type="button" id="deleteBtn">Удалить</button>
      <div class="row gap">
        <button class="btn" type="button" id="saveBtn">Сохранить</button>
      </div>
    </div>
  </form>
</div>

<script>
const scenarioId = {{ scenario.id }};
let currentScenario = null;
let isLoading = false;
let swaraRanking = [];
let swaraSValues = {};
let CRITERIA_GROUPS = {};
let CRITERIA_NAMES = {};

function showMessage(message, isError = false) {
  const existing = document.querySelector('.toast-message');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.className = `toast-message ${isError ? 'error' : ''}`;
  div.textContent = message;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2500);
}

function getCheckedCodes() {
  return Array.from(document.querySelectorAll('#criteriaBox input:checked'))
    .map(cb => cb.closest('.check-card').dataset.code);
}

async function loadCriteriaGroups() {
  const res = await fetch('/api/criteria');
  const criteria = await res.json();

  CRITERIA_GROUPS = {
    'Надёжность исполнения': {
      keys: ['on_time_rate', 'cancellation_rate', 'no_show_rate'],
      names: {}
    },
    'Сохранность и безопасность': {
      keys: ['damage_rate', 'loss_rate', 'accident_rate'],
      names: {}
    },
    'Прозрачность и документооборот': {
      keys: ['tracking_compliance', 'pod_rate'],
      names: {}
    },
    'Репутация': {
      keys: ['feedback_score'],
      names: {}
    },
    'Цена': {
      keys: ['rate_per_km'],
      names: {}
    }
  };

  criteria.forEach(c => {
    CRITERIA_NAMES[c.code] = c.name;
    for (const group of Object.values(CRITERIA_GROUPS)) {
      if (group.keys.includes(c.code)) {
        group.names[c.code] = c.name;
      }
    }
  });
}

async function loadScenario() {
  await loadCriteriaGroups();

  if (scenarioId === 0) {
    currentScenario = { name: '', description: '', method: 'topsis', criterion_ids: [] };
    document.getElementById('method').value = 'topsis';
    await loadCriteria();
    return;
  }

  try {
    const sRes = await fetch(`/api/scenarios/${scenarioId}`);
    if (!sRes.ok) throw new Error('Ошибка загрузки сценария');
    currentScenario = await sRes.json();
    document.getElementById('name').value = currentScenario.name;
    document.getElementById('description').value = currentScenario.description || '';
    document.getElementById('method').value = currentScenario.method || 'topsis';

    const swaraRes = await fetch(`/api/scenarios/${scenarioId}/weights/swara`);
    if (swaraRes.ok) {
      const swaraData = await swaraRes.json();
      swaraRanking = swaraData.ranking || [];
      swaraSValues = {};
      if (swaraData.s_values && swaraData.ranking) {
        for (let i = 1; i < swaraData.ranking.length; i++) {
          swaraSValues[swaraData.ranking[i]] = Math.round(swaraData.s_values[i - 1] * 100);
        }
      }
    }
    await loadCriteria();
  } catch (err) {
    showMessage(err.message, true);
  }
}

async function loadCriteria() {
  if (isLoading) return;
  const container = document.getElementById('criteriaBox');
  const loading = document.getElementById('criteriaLoading');
  isLoading = true;
  container.style.display = 'none';
  loading.style.display = 'block';

  try {
    const res = await fetch('/api/criteria');
    if (!res.ok) throw new Error('Ошибка загрузки критериев');
    const criteriaList = await res.json();
    const criteriaMap = new Map();
    criteriaList.forEach(c => criteriaMap.set(c.code, c));
    const selected = new Set((currentScenario.criterion_ids || []).map(Number));

    let html = '';
    for (const [groupName, groupData] of Object.entries(CRITERIA_GROUPS)) {
      const groupCriteria = [];
      for (const key of groupData.keys) {
        const criterion = criteriaMap.get(key);
        if (criterion) {
          groupCriteria.push({
            id: criterion.id,
            code: criterion.code,
            name: groupData.names[key] || criterion.name
          });
        }
      }
      if (groupCriteria.length === 0) continue;

      html += `
        <div class="criteria-group">
          <div class="criteria-group-header" data-group="${groupName.replace(/\s/g, '_')}">
            <span>${groupName}</span>
            <span class="toggle-icon">▼</span>
          </div>
          <div class="criteria-grid">
      `;
      for (const crit of groupCriteria) {
        const isChecked = selected.has(crit.id);
        html += `
          <label class="check-card" data-id="${crit.id}" data-code="${crit.code}">
            <input type="checkbox" value="${crit.id}" ${isChecked ? 'checked' : ''}>
            <span class="criterion-name">${crit.name}</span>
          </label>
        `;
      }
      html += '</div></div>';
    }
    container.innerHTML = html;

    container.querySelectorAll('.criteria-group-header').forEach(header => {
      header.addEventListener('click', function() {
        this.classList.toggle('collapsed');
      });
    });

    container.querySelectorAll('.check-card input').forEach(cb => {
      cb.addEventListener('change', function() {
        const checkedCodes = getCheckedCodes();
        swaraRanking = swaraRanking.filter(code => checkedCodes.includes(code));
        renderSwaraPanel();
      });
    });

    container.style.display = 'block';
    document.getElementById('swaraPanel').style.display = 'block';
    renderSwaraPanel();
  } catch (err) {
    showMessage(err.message, true);
  } finally {
    isLoading = false;
    loading.style.display = 'none';
  }
}

function renderSwaraPanel() {
  const container = document.getElementById('swaraContainer');
  const checkedCodes = getCheckedCodes();

  Object.keys(swaraSValues).forEach(code => {
    if (!checkedCodes.includes(code)) delete swaraSValues[code];
  });

  if (checkedCodes.length < 2) {
    container.innerHTML = '<p style="color: #667085; text-align: center;">Выберите минимум 2 критерия для настройки SWARA</p>';
    document.getElementById('swaraWeightsPreview').innerHTML = '';
    return;
  }

  const selectedCodes = checkedCodes.map(code => ({
    code: code,
    name: CRITERIA_NAMES[code] || code
  }));

  const newRanking = [
    ...swaraRanking.filter(code => checkedCodes.includes(code)),
    ...selectedCodes.filter(c => !swaraRanking.includes(c.code)).map(c => c.code)
  ];
  swaraRanking = newRanking;

  let html = '';
  swaraRanking.forEach((code, index) => {
    const criterion = selectedCodes.find(c => c.code === code);
    if (!criterion) return;

    const isFirst = index === 0;
    const aboveName = index > 0 ? (CRITERIA_NAMES[swaraRanking[index - 1]] || swaraRanking[index - 1]) : '';
    const sValue = swaraSValues[code] !== undefined ? swaraSValues[code] : 20;

    html += `
      <div class="swara-item" draggable="true" data-code="${code}">
        <span class="swara-rank">${index + 1}.</span>
        <span class="swara-name">${criterion.name}</span>
        ${isFirst ? `
          <span class="swara-hint">самый важный</span>
        ` : `
          <div class="swara-right">
            <span>«${aboveName}» важнее на</span>
            <input type="number" class="swara-input" data-code="${code}"
                   value="${sValue}" min="0" max="100" step="1">
            <span class="swara-unit">%</span>
          </div>
        `}
      </div>
    `;
  });

  container.innerHTML = html;

  container.querySelectorAll('.swara-item').forEach(item => {
    item.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', item.dataset.code);
      item.classList.add('dragging');
    });
    item.addEventListener('dragend', () => item.classList.remove('dragging'));
    item.addEventListener('dragover', e => e.preventDefault());
    item.addEventListener('drop', e => {
      e.preventDefault();
      const draggedCode = e.dataTransfer.getData('text/plain');
      const targetCode = item.dataset.code;
      if (draggedCode !== targetCode) {
        const draggedIndex = swaraRanking.indexOf(draggedCode);
        const targetIndex = swaraRanking.indexOf(targetCode);
        swaraRanking.splice(draggedIndex, 1);
        swaraRanking.splice(targetIndex, 0, draggedCode);
        renderSwaraPanel();
      }
    });
  });

  container.querySelectorAll('.swara-input').forEach(input => {
    const updateValue = () => {
      const code = input.dataset.code;
      let value = parseFloat(input.value) || 0;
      if (value < 0) value = 0;
      if (value > 100) value = 100;
      input.value = value;
      swaraSValues[code] = value;
      updateWeightsPreview();
    };

    input.addEventListener('input', updateValue);
    input.addEventListener('keydown', function(e) {
      if (!/^[0-9]$/.test(e.key) && !['Backspace', 'Delete', 'Tab', 'Escape', 'Enter',
           'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End'].includes(e.key)) {
        e.preventDefault();
      }
    });
    input.addEventListener('paste', function(e) {
      e.preventDefault();
      const pastedText = (e.clipboardData || window.clipboardData).getData('text');
      if (/^\d+$/.test(pastedText)) {
        let value = parseInt(pastedText, 10);
        if (value < 0) value = 0;
        if (value > 100) value = 100;
        input.value = value;
        swaraSValues[input.dataset.code] = value;
        updateWeightsPreview();
      }
    });
  });

  updateWeightsPreview();
}

async function updateWeightsPreview() {
  if (swaraRanking.length < 2) {
    document.getElementById('swaraWeightsPreview').innerHTML = '';
    return;
  }

  const sValues = swaraRanking.slice(1).map(code => (swaraSValues[code] || 20) / 100);

  try {
    const previewId = scenarioId === 0 ? 1 : scenarioId;
    const res = await fetch(`/api/scenarios/${previewId}/weights/swara/preview`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ranking: swaraRanking, s_values: sValues })
    });
    if (!res.ok) return;

    const data = await res.json();
    const weights = data.weights;
    let html = '<h4 style="margin-bottom: 12px; font-size: 14px;">Итоговые веса:</h4>';

    swaraRanking.forEach(code => {
      const weight = weights[code] || 0;
      const percent = (weight * 100).toFixed(1);
      const name = CRITERIA_NAMES[code] || code;
      html += `
        <div class="swara-weight-row">
          <span class="swara-weight-name">${name}</span>
          <div class="swara-weight-bar">
            <div class="swara-weight-fill" style="width: ${percent}%;">${percent}%</div>
          </div>
          <span class="swara-weight-value">${percent}%</span>
        </div>
      `;
    });
    document.getElementById('swaraWeightsPreview').innerHTML = html;
  } catch (err) {
    console.error('Ошибка предпросмотра весов:', err);
  }
}

function getPayload() {
  const sValues = swaraRanking.slice(1).map(code => (swaraSValues[code] || 20) / 100);
  return {
    name: document.getElementById('name').value.trim(),
    description: document.getElementById('description').value.trim(),
    method: document.getElementById('method').value,
    criterion_ids: Array.from(document.querySelectorAll('#criteriaBox input:checked')).map(x => Number(x.value)),
    swara_config: {
      ranking: swaraRanking,
      s_values: sValues
    }
  };
}

function validate(payload) {
  if (!payload.name) return 'Введите название';
  if (payload.criterion_ids.length < 2) return 'Выберите минимум 2 критерия';
  if (payload.swara_config.ranking.length < 2) return 'Настройте важность критериев (минимум 2)';
  return null;
}

async function saveScenario(showToast = true) {
  const payload = getPayload();
  const error = validate(payload);
  if (error) {
    showMessage(error, true);
    return false;
  }

  try {
    const isNew = scenarioId === 0;
    const url = isNew ? '/api/scenarios' : `/api/scenarios/${scenarioId}`;
    const method = isNew ? 'POST' : 'PUT';

    const res = await fetch(url, {
      method: method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Ошибка сохранения');
    }

    const data = await res.json();
    const savedId = isNew ? data.id : scenarioId;

    await fetch(`/api/scenarios/${savedId}/weights/swara`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload.swara_config)
    });

    if (showToast) showMessage('Сохранено');
    setTimeout(() => { window.location.href = '/'; }, 500);
    return true;
  } catch (err) {
    showMessage(err.message, true);
    return false;
  }
}

document.getElementById('saveBtn').addEventListener('click', () => saveScenario(true));

document.getElementById('deleteBtn').addEventListener('click', async () => {
  if (scenarioId === 0) {
    window.location.href = '/';
    return;
  }
  if (!confirm(`Удалить сценарий "${document.getElementById('name').value}"?`)) return;
  try {
    const res = await fetch(`/api/scenarios/${scenarioId}`, { method: 'DELETE' });
    if (!res.ok) throw new Error('Ошибка удаления');
    showMessage('Сценарий удалён');
    setTimeout(() => window.location.href = '/', 500);
  } catch (err) {
    showMessage(err.message, true);
  }
});

document.getElementById('name').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    saveScenario(true);
  }
});

loadScenario();
</script>
{% endblock %}
