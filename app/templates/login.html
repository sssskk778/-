{% extends 'base.html' %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="login-body">
  <div class="login-card">
    <h1>Вход</h1>
    <form id="loginForm">
      <div class="form-group">
        <label>Имя пользователя</label>
        <input type="text" name="username" class="form-control" placeholder="admin или user" required>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" class="form-control" placeholder="Введите пароль" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%;">Войти</button>
    </form>
    <p style="text-align: center; margin-top: 16px;">
      Нет аккаунта? <a href="{{ url_for('auth.register') }}">Зарегистрироваться</a>
    </p>
  </div>
</div>

<script>
function showMessage(message, isError = false) {
  const existing = document.querySelector('.toast-message');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.className = `toast-message ${isError ? 'error' : ''}`;
  div.textContent = message;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 3000);
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const res = await fetch('{{ url_for("auth.login_post") }}', {
    method: 'POST',
    body: fd
  });
  if (res.redirected) {
    window.location.href = res.url;
  } else {
    const text = await res.text();
    showMessage(text || 'Неверное имя пользователя или пароль.', true);
  }
});
</script>
{% endblock %}
