{% extends 'base.html' %}
{% block title %}Результаты{% endblock %}

{% block content %}
<div class="panel">
  <div class="panel-head">
    <a href="{{ url_for('web.index') }}" class="back-arrow">←</a>
    <h1>Результаты</h1>
    <div style="width: 30px;"></div>
  </div>

  <div class="filters">
    <div class="filter-grid">
      <div class="filter-group">
        <label>Поиск</label>
        <input type="text" id="searchInput" placeholder="Название перевозчика...">
      </div>
      <div class="filter-group">
        <label>Регион</label>
        <select id="regionFilter">
          <option value="">Все регионы</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Тип транспорта</label>
        <select id="fleetFilter">
          <option value="">Все типы</option>
        </select>
      </div>
      <div class="filter-group">
        <label id="scoreLabel">Оценка от</label>
        <input type="number" id="minScoreInput" step="0.01" min="0" max="1" placeholder="0.00">
      </div>
      <button class="btn btn-reset" id="resetFiltersBtn" style="height: 38px;">Сбросить</button>
    </div>
  </div>

  <div class="table-wrap">
    <table class="table" id="resultsTable">
      <thead>
        <tr>
          <th>Место</th>
          <th>Перевозчик</th>
          <th>Регион</th>
          <th>Тип парка</th>
          <th>Оценка</th>
          <th>Уровень</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="6" style="text-align: center;">Загрузка...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="pagination" id="pagination"></div>

  <div class="bottom-actions">
    <button class="btn" id="openRunBtn" type="button">Детали расчета</button>
    <button class="btn" id="exportBtn" type="button">Экспорт</button>
    {% if current_user.role == 'admin' %}
      <button class="btn btn-primary" id="rerunBtn" type="button">Обновить</button>
    {% endif %}
  </div>
</div>

<script>
const scenarioId = {{ scenario.id }};
let latestRunId = null;
let allResults = [];
let carriersData = [];
let currentPage = 1;
const rowsPerPage = 20;
let currentMethod = 'TOPSIS';

function formatFleetType(fleetType) {
  if (!fleetType) return '—';
  const types = {
    'все_типы': 'Все типы',
    'рефрижераторы': 'Рефрижераторы',
    'бортовые': 'Бортовые',
    'самосвалы': 'Самосвалы',
    'контейнеровозы': 'Контейнеровозы'
  };
  return types[fleetType] || fleetType;
}

function getScoreLevel(score) {
  if (score >= 0.8) return { text: 'Высокий', class: 'level-excellent', scoreClass: 'score-excellent' };
  if (score >= 0.6) return { text: 'Хороший', class: 'level-good', scoreClass: 'score-good' };
  if (score >= 0.4) return { text: 'Средний', class: 'level-medium', scoreClass: 'score-medium' };
  return { text: 'Низкий', class: 'level-low', scoreClass: 'score-low' };
}

function getLevelScore(result) {
  if (currentMethod.includes('VIKOR')) return 1 - result.score;
  return result.score;
}

function showMessage(message, type = 'success') {
  const existing = document.querySelector('.toast-message');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.className = `toast-message ${type}`;
  div.textContent = message;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2500);
}

function showLoading(show) {
  let overlay = document.querySelector('.loading-overlay');
  if (show) {
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      overlay.innerHTML = '<div class="spinner"></div>';
      document.body.appendChild(overlay);
    }
  } else if (overlay) {
    overlay.remove();
  }
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function loadCarriers() {
  try {
    const res = await fetch('/api/carriers');
    if (!res.ok) throw new Error(`Ошибка ${res.status}`);
    const json = await res.json();
    carriersData = json.data;
    populateFilters();
  } catch (err) {
    console.error('Ошибка загрузки перевозчиков:', err);
    carriersData = [];
  }
}

function populateFilters() {
  const regions = new Set();
  const fleets = new Set();
  carriersData.forEach(c => {
    if (c.region) regions.add(c.region);
    if (c.fleet_type) fleets.add(c.fleet_type);
  });
  const regionSelect = document.getElementById('regionFilter');
  regionSelect.innerHTML = '<option value="">Все регионы</option>';
  [...regions].sort().forEach(r => {
    const option = document.createElement('option');
    option.value = r; option.textContent = r;
    regionSelect.appendChild(option);
  });
  const fleetSelect = document.getElementById('fleetFilter');
  fleetSelect.innerHTML = '<option value="">Все типы</option>';
  [...fleets].sort().forEach(f => {
    const option = document.createElement('option');
    option.value = f; option.textContent = f;
    fleetSelect.appendChild(option);
  });
}

function enrichResults() {
  const carrierMap = new Map();
  carriersData.forEach(c => carrierMap.set(c.carrier_id, c));
  allResults = allResults.map(r => {
    const carrier = carrierMap.get(r.carrier_id) || {};
    return { ...r, region: carrier.region || '—', fleet_type: carrier.fleet_type || '—' };
  });
}

function getFiltered() {
  let filtered = [...allResults];
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  if (searchTerm) filtered = filtered.filter(r => r.company_name.toLowerCase().includes(searchTerm));
  const region = document.getElementById('regionFilter').value;
  if (region) filtered = filtered.filter(r => r.region === region);
  const fleet = document.getElementById('fleetFilter').value;
  if (fleet) filtered = filtered.filter(r => r.fleet_type === fleet);
  const minScore = parseFloat(document.getElementById('minScoreInput').value);
  if (!isNaN(minScore)) {
    filtered = filtered.filter(r => {
      const displayScore = currentMethod.includes('VIKOR') ? 1 - r.score : r.score;
      return displayScore >= minScore;
    });
  }
  return filtered;
}

function renderTable() {
  const filtered = getFiltered();
  const totalPages = Math.ceil(filtered.length / rowsPerPage);
  const start = (currentPage - 1) * rowsPerPage;
  const pageResults = filtered.slice(start, start + rowsPerPage);
  const tbody = document.querySelector('#resultsTable tbody');
  if (pageResults.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Нет результатов</td></tr>';
  } else {
    tbody.innerHTML = pageResults.map(r => {
      const levelScore = getLevelScore(r);
      const level = getScoreLevel(levelScore);
      const displayScore = currentMethod.includes('VIKOR') ? (1 - r.score).toFixed(4) : r.score.toFixed(4);
      return `<tr>
        <td>${r.rank}</td>
        <td><strong>${escapeHtml(r.company_name)}</strong></td>
        <td>${r.region !== '—' ? escapeHtml(r.region) : '—'}</td>
        <td>${r.fleet_type !== '—' ? escapeHtml(r.fleet_type) : '—'}</td>
        <td>${displayScore}</td>
        <td><span class="badge-level ${level.class}">${level.text}</span></td>
      </tr>`;
    }).join('');
  }
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const container = document.getElementById('pagination');
  if (totalPages <= 1) { container.innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
  }
  container.innerHTML = html;
  container.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      currentPage = parseInt(btn.dataset.page);
      renderTable();
    });
  });
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('regionFilter').value = '';
  document.getElementById('fleetFilter').value = '';
  document.getElementById('minScoreInput').value = '';
  currentPage = 1;
  renderTable();
}

async function load() {
  const tbody = document.querySelector('#resultsTable tbody');
  tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Загрузка...</td></tr>';
  try {
    await loadCarriers();
    const res = await fetch(`/api/scenarios/${scenarioId}/latest-results`);
    if (!res.ok) throw new Error('Ошибка загрузки');
    const json = await res.json();
    const data = json.data;
    latestRunId = data.run ? data.run.id : null;
    currentMethod = (data.run && data.run.meta && data.run.meta.method) || 'TOPSIS + SWARA';
    allResults = data.results || [];
    enrichResults();
    currentPage = 1;
    renderTable();
  } catch (err) {
    console.error('Load error:', err);
    tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #d11d1d;">${err.message}</td></tr>`;
  }
}

document.getElementById('openRunBtn').addEventListener('click', () => {
  if (latestRunId) {
    window.location.href = `/runs/${latestRunId}?from=results`;
  } else {
    showMessage('Нет запусков', 'error');
  }
});

document.getElementById('exportBtn').addEventListener('click', () => {
  window.location.href = `/api/scenarios/${scenarioId}/export`;
});

document.getElementById('resetFiltersBtn').addEventListener('click', resetFilters);
document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; renderTable(); });
document.getElementById('regionFilter').addEventListener('change', () => { currentPage = 1; renderTable(); });
document.getElementById('fleetFilter').addEventListener('change', () => { currentPage = 1; renderTable(); });
document.getElementById('minScoreInput').addEventListener('input', () => { currentPage = 1; renderTable(); });

const rerunBtn = document.getElementById('rerunBtn');
if (rerunBtn) {
  rerunBtn.addEventListener('click', async () => {
    if (!confirm('Запустить расчёт заново?')) return;
    showLoading(true);
    try {
      const res = await fetch(`/api/scenarios/${scenarioId}/run`, { method: 'POST' });
      if (!res.ok) {
        const json = await res.json();
        throw new Error(json.error || 'Ошибка');
      }
      showMessage('Расчёт завершён', 'success');
      await load();
    } catch (err) {
      showMessage(err.message || 'Ошибка перерасчёта', 'error');
    } finally {
      showLoading(false);
    }
  });
}

load();
</script>
{% endblock %}
