{% extends 'base.html' %}
{% block title %}Загрузки{% endblock %}

{% block content %}

<div class="panel">
  <div class="panel-head">
    <a href="{{ url_for('web.index') }}" class="back-arrow">←</a>
    <h1>Загрузки</h1>
  </div>

  <div style="margin-bottom: 20px;">
    <a href="{{ url_for('web.carriers_page') }}" class="btn btn-primary" style="display: inline-flex; align-items: center; gap: 8px;">
      <span>Список перевозчиков</span>
    </a>
  </div>

  <div class="main-grid">
    <div class="card">
      <h2>Импорт данных</h2>

      <form id="uploadForm">
        <div class="form-group">
          <label>Название</label>
          <input class="form-control" name="name" type="text" placeholder="Например: Март 2026" required>
        </div>

        <div class="form-group">
          <label>Описание</label>
          <textarea class="form-control" name="description" rows="1" style="resize: none;" placeholder="Краткое описание..."></textarea>
        </div>

        <div class="form-group">
          <label>Файл</label>
          <div class="upload-area" id="uploadArea">
            <input type="file" name="file" accept=".xlsx,.xls" style="display: none;" id="fileInput" required>
            <div>
              <div style="font-size: 32px; margin-bottom: 8px;">📁</div>
              <div style="font-weight: 500; margin-bottom: 4px;">Кликните или перетащите Excel-файл</div>
              <div style="font-size: 12px; color: #667085;">Поддерживаются файлы .xlsx и .xls</div>
              <div id="selectedFileName" style="margin-top: 8px; color: #2c67f2; font-size: 13px;"></div>
            </div>
          </div>
        </div>

        <button class="btn btn-primary" type="submit" style="width: 100%;">
          <span id="uploadBtnText">Импортировать</span>
          <span id="uploadSpinner" style="display: none;" class="loading-spinner"></span>
        </button>
      </form>
    </div>

    <div class="card">
      <h2>Ранее загруженные данные</h2>
      <div class="dataset-list" id="datasetList">
        <div class="empty-state">Загрузка...</div>
      </div>
    </div>
  </div>
</div>

<script>
function showToast(message, type = 'success') {
  const existing = document.querySelector('.toast-message');
  if (existing) existing.remove();

  const div = document.createElement('div');
  div.className = `toast-message ${type}`;
  div.textContent = message;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 3000);
}

async function loadData() {
  try {
    const res = await fetch('/api/datasets');
    if (!res.ok) throw new Error('Ошибка загрузки');
    const datasets = await res.json();

    const container = document.getElementById('datasetList');
    if (datasets.length === 0) {
      container.innerHTML = '<div class="empty-state">Нет загруженных данных</div>';
      return;
    }

    container.innerHTML = datasets.map(dataset => `
      <div class="dataset-item">
        <div class="dataset-header">
          <div class="dataset-name">${escapeHtml(dataset.name)}</div>
          <span style="font-size: 12px; color: #667085;">ID: ${dataset.id}</span>
        </div>
        ${dataset.description ? `<div style="font-size: 13px; color: #667085; margin-bottom: 8px;">${escapeHtml(dataset.description)}</div>` : ''}
        <div class="dataset-stats">
          <span>Записей: ${dataset.records_count || 0}</span>
          <span>${dataset.created_at ? new Date(dataset.created_at).toLocaleDateString('ru-RU') : '—'}</span>
        </div>
        <div class="dataset-actions">
          <button class="btn btn-danger btn-sm" onclick="deleteDataset(${dataset.id}, '${dataset.name.replace(/'/g, "\\'")}')">
            Удалить
          </button>
        </div>
      </div>
    `).join('');
  } catch (error) {
    showToast(error.message, 'error');
  }
}

async function deleteDataset(id, name) {
  if (!confirm(`Удалить загрузку "${name}"?`)) return;

  try {
    const res = await fetch(`/api/datasets/${id}`, {method: 'DELETE'});
    if (!res.ok) {
      const error = await res.json();
      throw new Error(error.error || 'Ошибка удаления');
    }
    showToast('Загрузка удалена', 'success');
    await loadData();
  } catch (error) {
    showToast(error.message, 'error');
  }
}

const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const selectedFileName = document.getElementById('selectedFileName');

uploadArea.addEventListener('click', () => fileInput.click());

uploadArea.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadArea.style.borderColor = '#2c67f2';
  uploadArea.style.background = '#f0f4fa';
});

uploadArea.addEventListener('dragleave', () => {
  uploadArea.style.borderColor = '#ccd7e5';
  uploadArea.style.background = '#fbfcff';
});

uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadArea.style.borderColor = '#ccd7e5';
  uploadArea.style.background = '#fbfcff';
  const files = e.dataTransfer.files;
  if (files.length > 0) {
    fileInput.files = files;
    selectedFileName.textContent = files[0].name;
  }
});

fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) {
    selectedFileName.textContent = fileInput.files[0].name;
  }
});

document.getElementById('uploadForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const submitBtn = e.target.querySelector('button[type="submit"]');
  const btnText = document.getElementById('uploadBtnText');
  const spinner = document.getElementById('uploadSpinner');

  btnText.style.display = 'none';
  spinner.style.display = 'inline-block';
  submitBtn.disabled = true;

  try {
    const fd = new FormData(e.target);
    const name = fd.get('name');
    const file = fd.get('file');

    if (!name || name.trim() === '') throw new Error('Введите название');
    if (!file || file.size === 0) throw new Error('Выберите файл');

    const fileName = file.name.toLowerCase();
    if (!fileName.endsWith('.xlsx') && !fileName.endsWith('.xls')) {
      throw new Error('Поддерживаются только Excel-файлы (.xlsx, .xls)');
    }

    const res = await fetch('/api/datasets/upload', {method: 'POST', body: fd});
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || 'Ошибка импорта');

    let msg = 'Данные успешно загружены';
    if (data.preprocess) {
      const p = data.preprocess;
      msg += ` | Перевозчиков: ${p.valid_carriers}/${p.total_carriers}, Рейсов: ${p.valid_shipments}/${p.total_shipments}`;
      if (p.total_errors > 0) {
        msg += ` | Ошибок: ${p.total_errors}`;
      }
    }
    showToast(msg, data.preprocess?.total_errors > 0 ? 'error' : 'success');

    e.target.reset();
    selectedFileName.textContent = '';
    fileInput.value = '';

    await loadData();
  } catch (error) {
    showToast(error.message, 'error');
  } finally {
    btnText.style.display = 'inline';
    spinner.style.display = 'none';
    submitBtn.disabled = false;
  }
});

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loadData();
</script>
{% endblock %}
