{% extends 'base.html' %}
{% block title %}Перевозчики{% endblock %}

{% block content %}

<div class="panel">
  <div class="panel-head">
    <a href="{{ url_for('web.dataset_page') }}" class="back-arrow">←</a>
    <h1>Перевозчики</h1>
  </div>

  <!-- Статистика -->
  <div class="stats-banner" id="statsBanner">
    <div>
      <h3>Всего перевозчиков</h3>
      <div class="value" id="totalCarriers">-</div>
    </div>
    <div>
      <h3>Регионов</h3>
      <div class="value" id="regionsCount">-</div>
    </div>
    <div>
      <h3>Типов парка</h3>
      <div class="value" id="fleetTypesCount">-</div>
    </div>
  </div>

  <!-- Фильтры и поиск -->
  <div class="filters-bar">
    <div class="filter-group search-group">
      <label>Поиск</label>
      <input type="text" id="searchInput" placeholder="Название...">
    </div>
    <div class="filter-group">
      <label>Регион</label>
      <select id="regionFilter">
        <option value="">Все регионы</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Тип парка</label>
      <select id="fleetFilter">
        <option value="">Все типы</option>
      </select>
    </div>
    <button class="btn-reset" onclick="resetFilters()" style="height: 40px; align-self: flex-end;">Сбросить</button>
  </div>

  <!-- Таблица -->
  <div class="carrier-table">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Название</th>
          <th>Регион</th>
          <th>Тип автопарка</th>
        </tr>
      </thead>
      <tbody id="carriersTableBody">
        <tr><td colspan="4" class="loading">Загрузка...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="results-info" id="resultsInfo"></div>

  <!-- Пагинация -->
  <div class="pagination" id="pagination"></div>
</div>

<script>
let allCarriers = [];
let filteredCarriers = [];
let currentPage = 1;
const itemsPerPage = 15;

async function loadCarriers() {
  try {
    const res = await fetch('/api/carriers');
    const json = await res.json();
    allCarriers = json.data;

    updateStats();
    populateFilters();
    applyFilters();

  } catch (error) {
    console.error('Ошибка загрузки:', error);
    document.getElementById('carriersTableBody').innerHTML =
      '<tr><td colspan="4" style="text-align: center; color: #d11d1d; padding: 40px;">Ошибка загрузки</td></tr>';
  }
}

function updateStats() {
  document.getElementById('totalCarriers').textContent = allCarriers.length;

  const regions = new Set(allCarriers.map(c => c.region).filter(Boolean));
  document.getElementById('regionsCount').textContent = regions.size;

  const fleets = new Set(allCarriers.map(c => c.fleet_type).filter(Boolean));
  document.getElementById('fleetTypesCount').textContent = fleets.size;
}

function populateFilters() {
  const regions = new Set();
  const fleets = new Set();

  allCarriers.forEach(c => {
    if (c.region) regions.add(c.region);
    if (c.fleet_type) fleets.add(c.fleet_type);
  });

  const regionSelect = document.getElementById('regionFilter');
  regionSelect.innerHTML = '<option value="">Все регионы</option>';
  [...regions].sort().forEach(r => {
    const option = document.createElement('option');
    option.value = r;
    option.textContent = r;
    regionSelect.appendChild(option);
  });

  const fleetSelect = document.getElementById('fleetFilter');
  fleetSelect.innerHTML = '<option value="">Все типы</option>';
  [...fleets].sort().forEach(f => {
    const option = document.createElement('option');
    option.value = f;
    option.textContent = f;
    fleetSelect.appendChild(option);
  });
}

function applyFilters() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  const region = document.getElementById('regionFilter').value;
  const fleet = document.getElementById('fleetFilter').value;

  filteredCarriers = allCarriers.filter(c => {
    if (searchTerm) {
      const nameMatch = (c.company_name || '').toLowerCase().includes(searchTerm);
      if (!nameMatch) return false;
    }
    if (region && c.region !== region) return false;
    if (fleet && c.fleet_type !== fleet) return false;
    return true;
  });

  filteredCarriers.sort((a, b) => (a.company_name || '').localeCompare(b.company_name || ''));

  currentPage = 1;
  renderTable();
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('regionFilter').value = '';
  document.getElementById('fleetFilter').value = '';
  applyFilters();
}

function renderTable() {
  const tbody = document.getElementById('carriersTableBody');
  const start = (currentPage - 1) * itemsPerPage;
  const pageCarriers = filteredCarriers.slice(start, start + itemsPerPage);

  if (pageCarriers.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">Перевозчики не найдены</td></tr>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  tbody.innerHTML = pageCarriers.map(c => `
    <tr>
      <td><span style="font-family: monospace;">${c.carrier_id}</span></td>
      <td><strong>${escapeHtml(c.company_name)}</strong></td>
      <td>${c.region ? `<span class="badge-region">${escapeHtml(c.region)}</span>` : '—'}</td>
      <td>${c.fleet_type ? `<span class="badge-fleet">${escapeHtml(c.fleet_type)}</span>` : '—'}</td>
    </tr>
  `).join('');

  renderPagination();
}

function renderPagination() {
  const totalPages = Math.ceil(filteredCarriers.length / itemsPerPage);
  const pagination = document.getElementById('pagination');

  if (totalPages <= 1) {
    pagination.innerHTML = '';
    return;
  }

  let html = '';
  html += `<button onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}>«</button>`;
  html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;

  const startPage = Math.max(1, currentPage - 2);
  const endPage = Math.min(totalPages, currentPage + 2);

  for (let i = startPage; i <= endPage; i++) {
    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
  }

  html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>›</button>`;
  html += `<button onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>»</button>`;

  pagination.innerHTML = html;
}

function goToPage(page) {
  if (page < 1 || page > Math.ceil(filteredCarriers.length / itemsPerPage)) return;
  currentPage = page;
  renderTable();
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('searchInput')?.addEventListener('input', applyFilters);
document.getElementById('regionFilter')?.addEventListener('change', applyFilters);
document.getElementById('fleetFilter')?.addEventListener('change', applyFilters);

loadCarriers();
</script>
{% endblock %}
