---
- name: Deploy Carrier Rating Platform
  hosts: all
  become: yes

  tasks:
    - name: Install Docker
      apt:
        name: docker.io
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Docker Compose
      get_url:
        url: https://github.com/docker/compose/releases/latest/download/docker-compose-Linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Create app directory
      file:
        path: /opt/carrier-rating
        state: directory
        mode: '0755'

    - name: Pull Docker images
      shell: |
        docker pull postgres:15-alpine
        docker pull askka/carrier-rating:latest

    - name: Stop and remove old containers
      shell: |
        docker stop carrier-rating carrier-db 2>/dev/null || true
        docker rm carrier-rating carrier-db 2>/dev/null || true
      ignore_errors: yes

    - name: Create network
      shell: docker network create carrier-net 2>/dev/null || true
      ignore_errors: yes

    - name: Start PostgreSQL
      shell: docker run -d --name carrier-db --network carrier-net -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=1234 -e POSTGRES_DB=rating_db postgres:15-alpine

    - name: Start application
      shell: docker run -d --name carrier-rating --network carrier-net -p 8000:8000 -e DATABASE_URL=postgresql://postgres:1234@carrier-db:5432/rating_db -e SECRET_KEY=carrier-rating-secret askka/carrier-rating:latest

    - name: Wait for app
      shell: sleep 10 && wget -q -O /dev/null http://host.docker.internal:8000 && echo 200
      register: health_check
      retries: 10
      delay: 3
      until: health_check.stdout == "200"

    - name: Status
      debug:
        msg: "Service healthy! Status: 200"